<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;900&family=Crimson+Pro:ital,wght@0,400;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="blue_card_style.css">
</head>

<body>
<div id="app" style="display:flex;justify-content:center;align-items:center;height:100vh;">

  <div class="nav-pill-wrap" style="width:100%;max-width:400px;">
    <div class="nav-pill-outer">
      <div class="card" style="padding:24px;">

        <!-- Header -->
        <div class="card-header" style="text-align:center;">
          <h2 style="font-family:'Playfair Display',serif;color:#c8a96e;margin-bottom:8px;">Sign In or Create Account</h2>
          <hr>
        </div>

        <!-- Card Body -->
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">

          <!-- Auth Error -->
          <div id="auth_error" style="display:none;color:#e8dcc8;font-family:'Space Mono',monospace;font-size:12px;text-align:center;background:rgba(200,169,110,0.1);padding:8px;border:1px solid rgba(200,169,110,0.3);border-radius:6px;"></div>

          <!-- Google Sign-In -->
          <button id="login-google-btn" style="padding:10px;background:#1a2a4a;border:1px solid gold;border-radius:8px;color:gold;font-family:'Space Mono',monospace;cursor:pointer;">
            Sign in with Google
          </button>

          <hr style="border-color:rgba(200,169,110,0.3);">

          <!-- Email/Password Sign-In -->
          <input id="login_email" type="email" placeholder="Email" style="padding:10px;border:1px solid rgba(200,169,110,0.3);border-radius:6px;font-family:'Space Mono',monospace;">
          <input id="login_password" type="password" placeholder="Password" style="padding:10px;border:1px solid rgba(200,169,110,0.3);border-radius:6px;font-family:'Space Mono',monospace;">
          
          <button id="login-email-btn" style="padding:10px;background:rgba(200,169,110,0.2);border:1px solid rgba(200,169,110,0.4);border-radius:8px;color:#c8a96e;font-family:'Space Mono',monospace;cursor:pointer;">
            Sign in with Email
          </button>

          <button id="login-forgot-btn" style="padding:8px;background:transparent;border:none;color:rgba(200,169,110,0.7);font-family:'Space Mono',monospace;cursor:pointer;text-decoration:underline;">
            Forgot Password?
          </button>

          <button id="login-create-btn" style="padding:10px;background:rgba(200,169,110,0.15);border:1px solid rgba(200,169,110,0.4);border-radius:8px;color:#c8a96e;font-family:'Space Mono',monospace;cursor:pointer;">
            Create Account
          </button>

        </div><!-- card-body -->
      </div><!-- card -->
    </div><!-- nav-pill-outer -->
  </div><!-- nav-pill-wrap -->

</div><!-- app -->

<script type="module">
import { auth } from './firebase_config.js';
import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Wire up the password recovery
document.addEventListener('DOMContentLoaded', () => {
  const forgotBtn = document.getElementById('login-forgot-btn');
  const emailInput = document.getElementById('login_email');
  const errorDiv = document.getElementById('auth_error');

  forgotBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) {
      errorDiv.textContent = "Please enter your email first.";
      errorDiv.style.display = "block";
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      errorDiv.textContent = "Password recovery email sent. Check your inbox.";
      errorDiv.style.display = "block";
    } catch (e) {
      errorDiv.textContent = e.message || "Could not send password recovery email.";
      errorDiv.style.display = "block";
    }
  });
});
</script>

<script type="module" src="cookbook_auth.js"></script>
</body>
</html>
